<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 - Page Not Found</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #141e30, #243b55);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 600px;
      padding: 30px;
      border-radius: 15px;
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0px 10px 25px rgba(0, 0, 0, 0.4);
    }

    h1 {
      font-size: 90px;
      margin: 0;
      color: #ffcc00;
    }

    h2 {
      margin-top: 10px;
      font-size: 28px;
    }

    p {
      font-size: 16px;
      margin: 15px 0 25px;
      opacity: 0.9;
    }

    a {
      text-decoration: none;
      background: #ffcc00;
      color: black;
      padding: 12px 25px;
      border-radius: 8px;
      font-weight: bold;
      transition: 0.3s;
    }

    a:hover {
      background: white;
      color: black;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>404</h1>
    <h2>Oops! Page Not Found</h2>
    <p>The page you are looking for might have been removed, renamed, or temporarily unavailable.</p>
    <a href="/">Go Back Home</a>
  </div>
</body>
</html>
